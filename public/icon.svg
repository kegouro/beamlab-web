<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Fondo y Contenedor -->
  <rect width="512" height="512" rx="112" fill="#0a0908" stroke="#2a2118" stroke-width="4"/>

  <!-- Retícula Científica de Fondo -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#2a2118" stroke-width="1.5" opacity="0.5"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="#2a2118" stroke-width="1.5" stroke-dasharray="4,8" opacity="0.4"/>
  <circle cx="256" cy="256" r="80" fill="none" stroke="#2a2118" stroke-width="1" opacity="0.3"/>
  <line x1="256" y1="50" x2="256" y2="462" stroke="#2a2118" stroke-width="1.5" stroke-dasharray="2,6" opacity="0.5"/>
  <line x1="50" y1="256" x2="462" y2="256" stroke="#2a2118" stroke-width="1.5" stroke-dasharray="2,6" opacity="0.5"/>

  <!-- Rayos de Luz -->
  <!-- 1. Rayo Incidente (Dorado) -->
  <line x1="70" y1="180" x2="213" y2="235" stroke="#f5a72c" stroke-width="10" stroke-opacity="0.25" stroke-linecap="round"/>
  <line x1="70" y1="180" x2="213" y2="235" stroke="#ffd690" stroke-width="3" stroke-linecap="round"/>

  <!-- 2. Refracción Interna (Dorado Atenuado) -->
  <line x1="213" y1="235" x2="285" y2="242" stroke="#f5a72c" stroke-width="8" stroke-opacity="0.15"/>
  <line x1="213" y1="235" x2="285" y2="242" stroke="#ffd690" stroke-width="2.5" opacity="0.75"/>

  <!-- Puntos de Contacto / Refracción -->
  <circle cx="213" cy="235" r="4" fill="#ffd690" opacity="0.7"/>
  <circle cx="285" cy="242" r="4" fill="#ffd690" opacity="0.7"/>

  <!-- 3. Dispersión Saliente (Tres Dominios de Lumina) -->
  <!-- Rayo 1: Óptica Geométrica (Ámbar) -->
  <line x1="285" y1="242" x2="442" y2="210" stroke="#f5a72c" stroke-width="8" stroke-opacity="0.3" stroke-linecap="round"/>
  <line x1="285" y1="242" x2="442" y2="210" stroke="#f5a72c" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Rayo 2: Óptica de Haces / Gaussianos (Verde) -->
  <line x1="285" y1="242" x2="442" y2="255" stroke="#34d399" stroke-width="8" stroke-opacity="0.25" stroke-linecap="round"/>
  <line x1="285" y1="242" x2="442" y2="255" stroke="#34d399" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Rayo 3: Óptica Ondulatoria / Ondas (Cian) -->
  <line x1="285" y1="242" x2="442" y2="300" stroke="#38bdf8" stroke-width="8" stroke-opacity="0.3" stroke-linecap="round"/>
  <line x1="285" y1="242" x2="442" y2="300" stroke="#38bdf8" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Prisma Óptico Principal (Bronce/Latón) -->
  <polygon points="256,155 345,310 167,310" fill="#15110d" fill-opacity="0.4" stroke="#9a8a76" stroke-width="3.5" stroke-linejoin="round"/>
</svg>
