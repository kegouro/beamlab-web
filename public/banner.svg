<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <!-- Gradiente de fondo para dar profundidad -->
    <radialGradient id="bg-glow" cx="20%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#15110d" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0908" stop-opacity="1"/>
    </radialGradient>
    <!-- Gradiente para el texto Lumina -->
    <linearGradient id="text-gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#efe7d8"/>
      <stop offset="100%" stop-color="#ffd690"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="400" fill="url(#bg-glow)" stroke="#2a2118" stroke-width="4"/>

  <!-- Retícula Técnica / Eje Óptico -->
  <line x1="50" y1="200" x2="1150" y2="200" stroke="#2a2118" stroke-width="1.5" stroke-dasharray="4,8" opacity="0.6"/>
  <line x1="220" y1="50" x2="220" y2="350" stroke="#2a2118" stroke-width="1.5" stroke-dasharray="2,6" opacity="0.4"/>
  
  <!-- Círculos de Enfoque / Ondas de fondo -->
  <circle cx="220" cy="200" r="150" fill="none" stroke="#2a2118" stroke-width="1" opacity="0.4"/>
  <circle cx="220" cy="200" r="100" fill="none" stroke="#2a2118" stroke-width="1" stroke-dasharray="2,4" opacity="0.3"/>
  <circle cx="220" cy="200" r="60" fill="none" stroke="#2a2118" stroke-width="1" opacity="0.2"/>

  <!-- Línea de plano focal / marcas graduadas -->
  <line x1="450" y1="80" x2="450" y2="320" stroke="#2a2118" stroke-width="1.5" opacity="0.5"/>
  <path d="M 445,100 L 455,100 M 445,150 L 455,150 M 445,200 L 455,200 M 445,250 L 455,250 M 445,300 L 455,300" stroke="#2a2118" stroke-width="1.5" opacity="0.5"/>

  <!-- Fina rejilla decorativa en la esquina derecha -->
  <path d="M 1050,50 L 1150,50 M 1050,70 L 1150,70 M 1050,90 L 1150,90 M 1050,110 L 1150,110 M 1110,30 L 1110,130" stroke="#2a2118" stroke-width="1" opacity="0.3"/>

  <!-- === LOGO E ILUSTRACIÓN ÓPTICA === -->
  <!-- Rayo Incidente (Dorado) -->
  <line x1="50" y1="120" x2="178" y2="178" stroke="#f5a72c" stroke-width="8" stroke-opacity="0.2" stroke-linecap="round"/>
  <line x1="50" y1="120" x2="178" y2="178" stroke="#ffd690" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Refracción Interna en el Prisma -->
  <line x1="178" y1="178" x2="250" y2="185" stroke="#f5a72c" stroke-width="6" stroke-opacity="0.1"/>
  <line x1="178" y1="178" x2="250" y2="185" stroke="#ffd690" stroke-width="2" opacity="0.7"/>

  <!-- Puntos de refracción -->
  <circle cx="178" cy="178" r="3.5" fill="#ffd690" opacity="0.6"/>
  <circle cx="250" cy="185" r="3.5" fill="#ffd690" opacity="0.6"/>

  <!-- Dispersión Saliente -->
  <!-- Rayo Ámbar (Óptica Geométrica) -->
  <line x1="250" y1="185" x2="450" y2="140" stroke="#f5a72c" stroke-width="6" stroke-opacity="0.25" stroke-linecap="round"/>
  <line x1="250" y1="185" x2="450" y2="140" stroke="#f5a72c" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Rayo Verde (Haces Gaussianos) -->
  <line x1="250" y1="185" x2="450" y2="200" stroke="#34d399" stroke-width="6" stroke-opacity="0.2" stroke-linecap="round"/>
  <line x1="250" y1="185" x2="450" y2="200" stroke="#34d399" stroke-width="3" stroke-linecap="round"/>

  <!-- Rayo Cian (Óptica Ondulatoria) -->
  <line x1="250" y1="185" x2="450" y2="260" stroke="#38bdf8" stroke-width="6" stroke-opacity="0.25" stroke-linecap="round"/>
  <line x1="250" y1="185" x2="450" y2="260" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>

  <!-- Prisma Óptico (Latón/Brone) -->
  <polygon points="220,100 305,250 135,250" fill="#15110d" fill-opacity="0.3" stroke="#9a8a76" stroke-width="3" stroke-linejoin="round"/>

  <!-- === ELEMENTO LENTE DECORATIVO (A la derecha de la dispersión) === -->
  <!-- Representa cómo la luz dispersada cruza una lente -->
  <path d="M 445,100 Q 455,200 445,300 Q 435,200 445,100" fill="#15110d" fill-opacity="0.4" stroke="#9a8a76" stroke-width="2.5" opacity="0.7"/>

  <!-- Rayos después de la Lente convergente enfocando hacia el eje -->
  <line x1="450" y1="140" x2="600" y2="200" stroke="#f5a72c" stroke-width="2.5" stroke-dasharray="1,2" opacity="0.6"/>
  <line x1="450" y1="200" x2="600" y2="200" stroke="#34d399" stroke-width="2.5" opacity="0.8"/>
  <line x1="450" y1="260" x2="600" y2="200" stroke="#38bdf8" stroke-width="2.5" stroke-dasharray="1,2" opacity="0.6"/>

  <!-- Foco común -->
  <circle cx="600" cy="200" r="5" fill="#ffd690" opacity="0.8"/>
  <circle cx="600" cy="200" r="15" fill="none" stroke="#ffd690" stroke-width="1" opacity="0.3"/>

  <!-- === TEXTOS / IDENTIDAD === -->
  <g transform="translate(640, 0)">
    <!-- Título Principal -->
    <text x="0" y="165" font-family="'Fraunces', Georgia, serif" font-size="72" font-weight="300" letter-spacing="6" fill="url(#text-gold)">Lumina</text>
    
    <!-- Subtítulo -->
    <text x="5" y="215" font-family="'Inter', system-ui, sans-serif" font-size="18" font-weight="400" letter-spacing="1.5" fill="#efe7d8" opacity="0.9">Curso-Laboratorio de Óptica Física y Paraxial</text>
    
    <!-- Metadatos de Proyecto / Estado -->
    <rect x="5" y="245" width="310" height="28" rx="6" fill="#15110d" stroke="#2a2118" stroke-width="1"/>
    <circle cx="20" cy="259" r="4" fill="#ff7a3c"/>
    <text x="35" y="264" font-family="'IBM Plex Mono', 'Fira Code', monospace" font-size="12" font-weight="500" letter-spacing="0.5" fill="#9a8a76">
      Pharos Project <tspan fill="#ffd690">· En Construcción</tspan>
    </text>
  </g>
</svg>
